services:
  - type: web
    name: stock-platform-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://stock-platform-8o8c.onrender.com
      - key: PORT
        value: "3000"
    plan: free

  - type: web
    name: stock-platform-api
    runtime: python
    rootDir: services/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: stock-platform-redis
          type: redis
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        sync: false
    plan: free

  - type: redis
    name: stock-platform-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
